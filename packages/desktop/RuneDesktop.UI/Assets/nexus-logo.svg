<?xml version="1.0" encoding="UTF-8"?>
<!--
  Nexus app icon. The "永生 agent" logo: a chain link forming an N.
  - Outer rounded square: BNB-yellow gradient (matches BrandAccentBrush)
  - The N is rendered as an open chain link — two rings with a diagonal
    bar — visually encoding the "two on-chain anchors connected by an
    immutable history" idea.
  - Sized at 1024x1024 for crisp dock / taskbar rendering on retina;
    scales down cleanly because all paths are vector.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024"
     viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#F0B90B"/>
    </linearGradient>
    <linearGradient id="bg-dark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#5C3F00"  stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"
        fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"
        fill="url(#bg-dark)"/>

  <!-- Subtle inner stroke -->
  <rect x="20" y="20" width="984" height="984" rx="200" ry="200"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.18"
        stroke-width="3"/>

  <!--
    "N" rendered as two chain rings + one diagonal connecting bar.
    Each ring is a thick stroke circle. Total composition is centred
    in the inner safe area (200..824 horizontally, 200..824 vertically).
  -->

  <!-- Left ring (top-left) -->
  <circle cx="312" cy="332" r="140" fill="none" stroke="#1A1006"
          stroke-width="80" stroke-linecap="round"/>

  <!-- Right ring (bottom-right) -->
  <circle cx="712" cy="692" r="140" fill="none" stroke="#1A1006"
          stroke-width="80" stroke-linecap="round"/>

  <!-- Diagonal bar joining them — the 'leg' of the N -->
  <line x1="372" y1="392" x2="652" y2="632"
        stroke="#1A1006" stroke-width="80" stroke-linecap="round"/>

  <!-- A faint highlight stroke layered on top to give the chain
       a slightly metallic feel -->
  <circle cx="312" cy="332" r="140" fill="none" stroke="#FFFFFF"
          stroke-opacity="0.18" stroke-width="6"/>
  <circle cx="712" cy="692" r="140" fill="none" stroke="#FFFFFF"
          stroke-opacity="0.18" stroke-width="6"/>
  <line x1="372" y1="392" x2="652" y2="632"
        stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="6"
        stroke-linecap="round"/>
</svg>
